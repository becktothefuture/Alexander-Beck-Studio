<!doctype html>
<html lang="en" class="fonts-loading panel-host-html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/normalize.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/panel.css" />
  </head>
  <body class="panel-host-body">
    <div class="panel-host-shell">
      <div class="panel-host-caption" aria-hidden="true">
        <div id="panel-host-window-title" class="panel-host-window-title">Config Panel for Alexander Beck Studio</div>
        <div id="panel-host-window-subtitle" class="panel-host-window-subtitle">Connecting…</div>
      </div>
      <div class="panel-host-preview" aria-hidden="true">
        <div class="panel-host-preview-meta">
          <div class="panel-host-preview-label">Paired host window</div>
          <div id="panel-host-preview-status" class="panel-host-preview-status">Linking…</div>
        </div>
        <div class="panel-host-preview-browser">
          <div class="panel-host-preview-browser-bar">
            <div class="panel-host-preview-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div id="panel-host-preview-address" class="panel-host-preview-address">Waiting for host…</div>
            <div id="panel-host-preview-size" class="panel-host-preview-size">--</div>
          </div>
          <div id="panel-host-preview-viewport" class="panel-host-preview-viewport">
            <iframe
              id="panel-host-preview-frame"
              class="panel-host-preview-frame is-hidden"
              title="Live site thumbnail"
              aria-hidden="true"
              tabindex="-1"
            ></iframe>
            <canvas id="panel-host-preview-canvas" class="panel-host-preview-canvas is-hidden"></canvas>
            <div id="panel-host-preview-empty" class="panel-host-preview-empty">Live pairing active</div>
            <div class="panel-host-preview-overlay">
              <div id="panel-host-preview-route" class="panel-host-preview-route">Home</div>
            </div>
          </div>
        </div>
      </div>
      <div id="panel-host-root" class="panel-host-root">
        <div class="panel-host-placeholder">Connecting settings…</div>
      </div>
    </div>
    <script type="module" src="/src/entries/panel-host.js"></script>
  </body>
</html>
