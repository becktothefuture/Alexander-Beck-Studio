<!doctype html>
<html lang="en" class="fonts-loading" data-abs-boot-state="booting" style="background:#141517;background-color:#141517">
  <head>
    <style id="fade-blocking">#root,#abs-scene,#app-frame{opacity:0;visibility:hidden}</style>
    <style id="abs-critical-shell">
      html, body, #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--abs-browser-chrome, #141517);
        background-color: var(--abs-browser-chrome, #141517);
      }

      html[data-abs-boot-state="booting"]::before,
      html[data-abs-boot-state="booting"]::after {
        content: "";
        position: fixed;
        pointer-events: none;
      }

      html[data-abs-boot-state="booting"]::before {
        inset: 0;
        z-index: 2147482998;
        background: var(--abs-browser-chrome, #141517);
      }

      html[data-abs-boot-state="booting"]::after {
        top: 50%;
        left: 50%;
        z-index: 2147482999;
        width: 4.5px;
        height: 4.5px;
        margin: -2.25px 0 0 -2.25px;
        border-radius: 50%;
        background: transparent;
        box-shadow:
          0 -11px var(--ball-1, #b5b7b6),
          9.5px -5.5px var(--ball-4, #00695c),
          9.5px 5.5px var(--ball-3, #ffffff),
          0 11px var(--ball-7, #0d5cb6),
          -9.5px 5.5px var(--ball-8, #ffa000),
          -9.5px -5.5px var(--ball-6, #d7ff2f);
        animation:
          absCriticalBootOrbit var(--abs-boot-orbit-ms, 1320ms) linear infinite,
          absCriticalBootColorShift var(--abs-boot-color-cycle-ms, 1560ms) steps(1, end) infinite;
      }

      #root[aria-hidden="true"],
      html[data-abs-boot-state="booting"] #root {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      html[data-abs-boot-state="revealing"] #root,
      html[data-abs-boot-state="ready"] #root,
      html[data-abs-boot-state="failed"] #root {
        opacity: 1;
        visibility: visible;
      }

      #abs-boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: grid;
        place-items: center;
        background: var(--abs-browser-chrome, #141517);
        color: var(--abs-boot-spinner-color, rgba(255, 255, 255, 0.82));
        opacity: 1;
        pointer-events: auto;
        transition: opacity var(--abs-boot-overlay-out-ms, 300ms) cubic-bezier(0.16, 1, 0.3, 1);
      }

      #abs-boot-overlay.is-exiting {
        opacity: 0;
        pointer-events: none;
      }

      #abs-boot-overlay.is-exiting #abs-boot-spinner {
        opacity: 0;
        visibility: hidden;
        animation: none;
        transition: none;
      }

      #abs-boot-spinner {
        width: 32px;
        height: 32px;
        position: relative;
        box-sizing: border-box;
        animation: absBootOrbit var(--abs-boot-orbit-ms, 1320ms) linear infinite;
      }

      .abs-boot-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4.5px;
        height: 4.5px;
        margin: -2.25px 0 0 -2.25px;
        border-radius: 50%;
        transform: rotate(var(--abs-dot-angle)) translateY(-11px);
      }

      .abs-boot-dot:nth-child(1) { --abs-dot-color-delay: 0ms; }
      .abs-boot-dot:nth-child(2) { --abs-dot-color-delay: -260ms; }
      .abs-boot-dot:nth-child(3) { --abs-dot-color-delay: -520ms; }
      .abs-boot-dot:nth-child(4) { --abs-dot-color-delay: -780ms; }
      .abs-boot-dot:nth-child(5) { --abs-dot-color-delay: -1040ms; }
      .abs-boot-dot:nth-child(6) { --abs-dot-color-delay: -1300ms; }

      .abs-boot-dot::before {
        content: "";
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: var(--abs-dot-color);
        box-shadow: 0 0 8px color-mix(in srgb, var(--abs-dot-color) 30%, transparent);
        animation:
          absBootDotPulse var(--abs-boot-orbit-ms, 1320ms) cubic-bezier(0.16, 1, 0.3, 1) infinite,
          absBootDotColorShift var(--abs-boot-color-cycle-ms, 1560ms) steps(1, end) infinite;
        animation-delay: var(--abs-dot-delay), var(--abs-dot-color-delay, 0ms);
      }

      @keyframes absBootOrbit {
        to { transform: rotate(360deg); }
      }

      @keyframes absCriticalBootOrbit {
        to { transform: rotate(360deg); }
      }

      @keyframes absCriticalBootColorShift {
        0%, 15.99%, 100% {
          box-shadow:
            0 -11px var(--ball-1, #b5b7b6),
            9.5px -5.5px var(--ball-4, #00695c),
            9.5px 5.5px var(--ball-3, #ffffff),
            0 11px var(--ball-7, #0d5cb6),
            -9.5px 5.5px var(--ball-8, #ffa000),
            -9.5px -5.5px var(--ball-6, #d7ff2f);
        }
        16.66%, 32.99% {
          box-shadow:
            0 -11px var(--ball-4, #00695c),
            9.5px -5.5px var(--ball-3, #ffffff),
            9.5px 5.5px var(--ball-7, #0d5cb6),
            0 11px var(--ball-8, #ffa000),
            -9.5px 5.5px var(--ball-6, #d7ff2f),
            -9.5px -5.5px var(--ball-1, #b5b7b6);
        }
        33.33%, 49.99% {
          box-shadow:
            0 -11px var(--ball-3, #ffffff),
            9.5px -5.5px var(--ball-7, #0d5cb6),
            9.5px 5.5px var(--ball-8, #ffa000),
            0 11px var(--ball-6, #d7ff2f),
            -9.5px 5.5px var(--ball-1, #b5b7b6),
            -9.5px -5.5px var(--ball-4, #00695c);
        }
        50%, 66.65% {
          box-shadow:
            0 -11px var(--ball-7, #0d5cb6),
            9.5px -5.5px var(--ball-8, #ffa000),
            9.5px 5.5px var(--ball-6, #d7ff2f),
            0 11px var(--ball-1, #b5b7b6),
            -9.5px 5.5px var(--ball-4, #00695c),
            -9.5px -5.5px var(--ball-3, #ffffff);
        }
        66.66%, 83.32% {
          box-shadow:
            0 -11px var(--ball-8, #ffa000),
            9.5px -5.5px var(--ball-6, #d7ff2f),
            9.5px 5.5px var(--ball-1, #b5b7b6),
            0 11px var(--ball-4, #00695c),
            -9.5px 5.5px var(--ball-3, #ffffff),
            -9.5px -5.5px var(--ball-7, #0d5cb6);
        }
        83.33%, 99.99% {
          box-shadow:
            0 -11px var(--ball-6, #d7ff2f),
            9.5px -5.5px var(--ball-1, #b5b7b6),
            9.5px 5.5px var(--ball-4, #00695c),
            0 11px var(--ball-3, #ffffff),
            -9.5px 5.5px var(--ball-7, #0d5cb6),
            -9.5px -5.5px var(--ball-8, #ffa000);
        }
      }

      @keyframes absBootDotPulse {
        0%, 100% {
          opacity: 0.54;
          transform: scale(0.82);
        }
        42%, 58% {
          opacity: 1;
          transform: scale(1.08);
        }
      }

      @keyframes absBootDotColorShift {
        0%, 15.99%, 100% { background: var(--ball-1, #b5b7b6); }
        16.66%, 32.99% { background: var(--ball-4, #00695c); }
        33.33%, 49.99% { background: var(--ball-3, #ffffff); }
        50%, 66.65% { background: var(--ball-7, #0d5cb6); }
        66.66%, 83.32% { background: var(--ball-8, #ffa000); }
        83.33%, 99.99% { background: var(--ball-6, #d7ff2f); }
      }

      @media (prefers-reduced-motion: reduce) {
        #abs-boot-overlay {
          --abs-boot-overlay-out-ms: 150ms;
        }

        #abs-boot-spinner {
          animation: none;
        }

        html[data-abs-boot-state="booting"]::after {
          animation: none;
        }

        .abs-boot-dot::before {
          animation: none;
          opacity: 0.86;
          transform: none;
          background: var(--abs-dot-color);
        }
      }
    </style>
    <script>
      (function() {
        window.__ABS_BOOT_STARTED_AT__ = (window.performance && typeof window.performance.now === 'function') ? window.performance.now() : Date.now();
        var root = document.documentElement;
        root.classList.add('palette-lab-shell');
        var DEFAULTS = {
          bgLight: '#efefef',
          bgDark: '#181818',
          wallBaseLight: '#efefef',
          wallBaseDark: '#181818',
          frameColorLight: '#202124',
          frameColorDark: '#141517',
          safariFrameLight: '#181818',
          safariFrameDark: '#141517',
          lockedHeaderLight: '#f1f3f4',
          lockedHeaderDark: '#141517'
        };

        function detectBrowserFamily() {
          var ua = navigator.userAgent || '';
          var vendor = navigator.vendor || '';
          var isFirefox = /Firefox\//.test(ua) || /FxiOS\//.test(ua);
          var isSafari = /Safari\//.test(ua)
            && /Apple/.test(vendor)
            && !/Chrome\//.test(ua)
            && !/Chromium\//.test(ua)
            && !/CriOS\//.test(ua)
            && !/FxiOS\//.test(ua)
            && !/Edg\//.test(ua)
            && !/EdgiOS\//.test(ua)
            && !/OPR\//.test(ua)
            && !/OPiOS\//.test(ua);
          var isSamsungInternet = /SamsungBrowser\//.test(ua);
          var isChromium = /Chrome\//.test(ua)
            || /Chromium\//.test(ua)
            || /CriOS\//.test(ua)
            || /Edg\//.test(ua)
            || /EdgiOS\//.test(ua)
            || /OPR\//.test(ua)
            || /OPiOS\//.test(ua)
            || /Brave\//.test(ua)
            || isSamsungInternet;
          return { isFirefox: isFirefox, isSafari: isSafari, isChromium: isChromium, isSamsungInternet: isSamsungInternet };
        }

        function themeColorLikelyApplied(family) {
          var ua = navigator.userAgent || '';
          var isAndroid = /Android/.test(ua);
          var isIOS = /iPhone|iPad|iPod/.test(ua) || (/Mac/.test(ua) && navigator.maxTouchPoints > 1);
          var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
            || (window.matchMedia && window.matchMedia('(display-mode: minimal-ui)').matches)
            || navigator.standalone === true;

          if (family.isFirefox) return false;
          if (isStandalone) return true;
          if (family.isSafari) return true;
          if (family.isChromium) return isAndroid || family.isSamsungInternet;
          return isAndroid || isIOS;
        }

        function syncMeta(name, media, color) {
          var selector = media ? 'meta[name="' + name + '"][media="' + media + '"]' : 'meta[name="' + name + '"]:not([media])';
          var tag = document.querySelector(selector);
          if (!tag) {
            tag = document.createElement('meta');
            tag.name = name;
            if (media) tag.media = media;
            document.head.appendChild(tag);
          }
          tag.content = color;
        }

        function isLightHex(color) {
          var hex = String(color || '').replace('#', '').trim();
          if (hex.length === 3) {
            hex = hex.split('').map(function(part) { return part + part; }).join('');
          }
          if (hex.length !== 6) return false;
          var r = parseInt(hex.slice(0, 2), 16);
          var g = parseInt(hex.slice(2, 4), 16);
          var b = parseInt(hex.slice(4, 6), 16);
          if ([r, g, b].some(function(value) { return Number.isNaN(value); })) return false;
          return ((r * 299) + (g * 587) + (b * 114)) / 1000 > 186;
        }

        function applyPalette(isDark) {
          var family = detectBrowserFamily();
          var useLockedPalette = !family.isSafari && !themeColorLikelyApplied(family);
          var innerLight = DEFAULTS.wallBaseLight;
          var innerDark = DEFAULTS.wallBaseDark;
          var frameLight;
          var frameDark;
          if (family.isSafari) {
            frameLight = DEFAULTS.safariFrameLight;
            frameDark = DEFAULTS.safariFrameDark;
          } else if (useLockedPalette) {
            frameLight = DEFAULTS.lockedHeaderLight;
            frameDark = DEFAULTS.lockedHeaderDark;
          } else {
            frameLight = DEFAULTS.frameColorLight;
            frameDark = DEFAULTS.frameColorDark;
          }
          var activeInner = isDark ? innerDark : innerLight;
          var activeFrame = isDark ? frameDark : frameLight;

          root.style.colorScheme = isDark ? 'dark' : 'light';
          root.style.setProperty('--color-bg-light', DEFAULTS.bgLight);
          root.style.setProperty('--color-bg-dark', DEFAULTS.bgDark);
          root.style.setProperty('--bg-light', DEFAULTS.bgLight);
          root.style.setProperty('--bg-dark', DEFAULTS.bgDark);
          root.style.setProperty('--abs-wall-base-light', innerLight);
          root.style.setProperty('--abs-wall-base-dark', innerDark);
          root.style.setProperty('--abs-wall-base', activeInner);
          root.style.setProperty('--frame-color-site-light', DEFAULTS.frameColorLight);
          root.style.setProperty('--frame-color-site-dark', DEFAULTS.frameColorDark);
          root.style.setProperty('--abs-browser-chrome', activeFrame);
          root.style.setProperty('--frame-color-light', frameLight);
          root.style.setProperty('--frame-color-dark', frameDark);
          root.style.setProperty('--frame-color', activeFrame);
          root.style.setProperty('--wall-color-light', frameLight);
          root.style.setProperty('--wall-color-dark', frameDark);
          root.style.setProperty('--wall-color', activeFrame);
          root.style.setProperty('--chrome-bg-light', frameLight);
          root.style.setProperty('--chrome-bg-dark', frameDark);
          root.style.setProperty('--chrome-bg', activeFrame);
          root.style.setProperty('--abs-boot-spinner-color', isLightHex(activeFrame) ? 'rgba(32, 33, 36, 0.72)' : 'rgba(255, 255, 255, 0.82)');
          root.style.setProperty('--abs-safe-top', 'env(safe-area-inset-top, 0px)');
          root.style.setProperty('--abs-safe-right', 'env(safe-area-inset-right, 0px)');
          root.style.setProperty('--abs-safe-bottom', 'env(safe-area-inset-bottom, 0px)');
          root.style.setProperty('--abs-safe-left', 'env(safe-area-inset-left, 0px)');
          root.dataset.absBootState = 'booting';

          syncMeta('theme-color', '(prefers-color-scheme: light)', frameLight);
          syncMeta('theme-color', '(prefers-color-scheme: dark)', frameDark);
          syncMeta('theme-color', '', activeFrame);
          syncMeta('apple-mobile-web-app-status-bar-style', '', 'black-translucent');
        }

        var savedTheme = 'auto';
        try {
          savedTheme = localStorage.getItem('theme-preference-v2') || 'auto';
        } catch (_error) {}

        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var hour = new Date().getHours();
        var isNight = hour >= 18 || hour < 6;
        var isDark = savedTheme === 'dark' || (savedTheme !== 'light' && (prefersDark || isNight));

        if (isDark) root.classList.add('dark-mode');
        applyPalette(isDark);

        document.addEventListener('DOMContentLoaded', function() {
          if (document.body && isDark) document.body.classList.add('dark-mode');
        }, { once: true });
      })();
    </script>

  <body class="body">
    <div id="abs-boot-overlay" aria-hidden="true">
      <div id="abs-boot-spinner" aria-hidden="true">
        <span class="abs-boot-dot" style="--abs-dot-angle:0deg;--abs-dot-delay:0ms;--abs-dot-color:var(--ball-1,#b5b7b6)"></span>
        <span class="abs-boot-dot" style="--abs-dot-angle:60deg;--abs-dot-delay:80ms;--abs-dot-color:var(--ball-4,#00695c)"></span>
        <span class="abs-boot-dot" style="--abs-dot-angle:120deg;--abs-dot-delay:160ms;--abs-dot-color:var(--ball-3,#ffffff)"></span>

        <span class="abs-boot-dot" style="--abs-dot-angle:240deg;--abs-dot-delay:320ms;--abs-dot-color:var(--ball-8,#ffa000)"></span>
