<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">React vs HTML Architecture</title>
  <desc id="desc">A side-by-side architecture diagram comparing the HTML and React pipelines.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 32px Arial, sans-serif; fill: #111827; }
      .section { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 600 17px Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Arial, sans-serif; fill: #374151; }
      .box-html { fill: #e6f4ea; stroke: #2f9e44; stroke-width: 2; rx: 14; }
      .box-react { fill: #e7f1ff; stroke: #1971c2; stroke-width: 2; rx: 14; }
      .box-neutral { fill: #ffffff; stroke: #9ca3af; stroke-width: 2; rx: 14; }
      .line-html { stroke: #2f9e44; stroke-width: 3; fill: none; }
      .line-react { stroke: #1971c2; stroke-width: 3; fill: none; }
      .line-neutral { stroke: #6b7280; stroke-width: 3; fill: none; }
      .pill-html { fill: #2f9e44; }
      .pill-react { fill: #1971c2; }
      .pill-text { font: 700 13px Arial, sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrow-neutral" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-html" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f9e44"/>
    </marker>
    <marker id="arrow-react" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1971c2"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="820"/>
  <text class="title" x="700" y="56" text-anchor="middle">React vs HTML: High-Level Architecture</text>

  <rect class="box-neutral" x="520" y="90" width="360" height="84"/>
  <text class="label" x="700" y="132" text-anchor="middle">User Opens Page</text>
  <text class="small" x="700" y="154" text-anchor="middle">Request enters one of two pipelines</text>

  <line class="line-neutral" x1="700" y1="174" x2="700" y2="215" marker-end="url(#arrow-neutral)"/>

  <rect class="box-neutral" x="540" y="222" width="320" height="70"/>
  <text class="label" x="700" y="264" text-anchor="middle">Pipeline Split</text>

  <line class="line-html" x1="540" y1="257" x2="340" y2="257" marker-end="url(#arrow-html)"/>
  <line class="line-react" x1="860" y1="257" x2="1060" y2="257" marker-end="url(#arrow-react)"/>

  <rect class="pill-html" x="140" y="305" width="410" height="34" rx="17"/>
  <text class="pill-text" x="345" y="327" text-anchor="middle">HTML PIPELINE (Vanilla JS MPA)</text>

  <rect class="pill-react" x="850" y="305" width="410" height="34" rx="17"/>
  <text class="pill-text" x="1055" y="327" text-anchor="middle">REACT PIPELINE (Hybrid Shell + Legacy Runtime)</text>

  <rect class="box-html" x="140" y="356" width="410" height="74"/>
  <text class="label" x="345" y="398" text-anchor="middle">html-site/source/*.html</text>
  <line class="line-html" x1="345" y1="430" x2="345" y2="452" marker-end="url(#arrow-html)"/>

  <rect class="box-html" x="140" y="460" width="410" height="74"/>
  <text class="label" x="345" y="502" text-anchor="middle">Direct ES Module Script</text>
  <line class="line-html" x1="345" y1="534" x2="345" y2="556" marker-end="url(#arrow-html)"/>

  <rect class="box-html" x="140" y="564" width="410" height="74"/>
  <text class="label" x="345" y="606" text-anchor="middle">main.js / portfolio app.js / cv-init.js</text>
  <line class="line-html" x1="345" y1="638" x2="345" y2="660" marker-end="url(#arrow-html)"/>

  <rect class="box-html" x="140" y="668" width="410" height="92"/>
  <text class="label" x="345" y="707" text-anchor="middle">modules/* runtime</text>
  <text class="small" x="345" y="731" text-anchor="middle">Physics + Rendering + UI + Modes</text>

  <rect class="box-react" x="850" y="356" width="410" height="74"/>
  <text class="label" x="1055" y="398" text-anchor="middle">react-app/app/*.html</text>
  <line class="line-react" x1="1055" y1="430" x2="1055" y2="452" marker-end="url(#arrow-react)"/>

  <rect class="box-react" x="850" y="460" width="410" height="74"/>
  <text class="label" x="1055" y="502" text-anchor="middle">src/entries/*.jsx (createRoot)</text>
  <line class="line-react" x1="1055" y1="534" x2="1055" y2="556" marker-end="url(#arrow-react)"/>

  <rect class="box-react" x="850" y="564" width="410" height="74"/>
  <text class="label" x="1055" y="598" text-anchor="middle">Page Components + SharedFrame</text>
  <text class="small" x="1055" y="620" text-anchor="middle">Inject template HTML into React shell</text>
  <line class="line-react" x1="1055" y1="638" x2="1055" y2="660" marker-end="url(#arrow-react)"/>

  <rect class="box-react" x="850" y="668" width="410" height="92"/>
  <text class="label" x="1055" y="705" text-anchor="middle">useLegacyBootstrap() dynamic import</text>
  <text class="small" x="1055" y="731" text-anchor="middle">src/legacy/modules/* runtime executes</text>
</svg>
