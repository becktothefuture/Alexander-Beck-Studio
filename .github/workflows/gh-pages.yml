name: Deploy to GitHub Pages (React app)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (React)
        run: |
          cd react-app/app
          if [ -f package-lock.json ]; then npm ci --ignore-scripts --no-audit --no-fund; else npm install --no-audit --no-fund; fi

      - name: Build React app
        run: cd react-app/app && npm run build

      - name: Verify build output
        run: |
          test -f react-app/app/dist/index.html || (echo "Missing react-app/app/dist/index.html" && exit 1)
          test -f react-app/app/dist/css/tokens.css || (echo "Missing CSS — public/ not copied to dist" && exit 1)
          test -f react-app/app/dist/config/default-config.json || (echo "Missing config — public/ not copied to dist" && exit 1)
          test -f react-app/app/dist/.nojekyll || (echo "Missing .nojekyll" && exit 1)
          echo "Build output verified:"
          ls -la react-app/app/dist/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dist artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: react-app/app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
